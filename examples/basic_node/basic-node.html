<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenLcbJSLib — Basic Node Example</title>
<style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.4em; }
    section { border: 1px solid #ccc; border-radius: 6px; padding: 1em; margin: 1em 0; }
    label { display: inline-block; width: 11em; }
    input[type=text] { width: 20em; padding: 0.25em; }
    button { padding: 0.35em 0.9em; margin-right: 0.5em; }
    .status { font-weight: bold; }
    .status.connected { color: #2a7f2a; }
    .status.connecting { color: #b88600; }
    .status.disconnected { color: #a00; }
    #log { font-family: Menlo, Consolas, monospace; font-size: 0.85em; white-space: pre-wrap; height: 14em; overflow: auto; background: #f6f6f6; border: 1px solid #ddd; padding: 0.5em; }
    .row { margin-bottom: 0.5em; }
</style>
</head>
<body>

<h1>OpenLcbJSLib — Basic Node Example</h1>

<p>Connects one virtual OpenLCB node to a GridConnect WebSocket server (JMRI,
an OpenLCB hub, etc.) and lets you publish PC Event Reports. Open the browser
console to see the full protocol trace.</p>

<section>
    <div class="row">
        <label for="url">WebSocket URL</label>
        <input id="url" type="text" value="ws://localhost:12080/lcc/hub/">
    </div>
    <div class="row">
        <label for="nodeId">Node ID (hex)</label>
        <input id="nodeId" type="text" value="">
    </div>
    <div class="row">
        <label for="consumerCount">Consumer count</label>
        <input id="consumerCount" type="number" min="0" max="255" value="0">
    </div>
    <div class="row">
        <label for="producerCount">Producer count</label>
        <input id="producerCount" type="number" min="0" max="255" value="0">
    </div>
    <div class="row">
        <button id="connect">Connect</button>
        <button id="disconnect" disabled>Disconnect</button>
        <span id="state" class="status disconnected">disconnected</span>
    </div>
</section>

<section>
    <div class="row">
        <label for="event">Event ID (hex, 16 chars)</label>
        <input id="event" type="text" value="0101000000000201">
    </div>
    <div class="row">
        <button id="sendPcer" disabled>Send PC Event Report</button>
    </div>
</section>

<section>
    <h2 style="font-size:1em;margin-top:0">Log</h2>
    <div id="log"></div>
</section>

<!--
    ESM — imports the wrapper directly.  Serve this file from an HTTP server
    (e.g. `python3 -m http.server 8766` from the project root) and open
    http://localhost:8766/examples/basic_node/basic-node.html .
-->
<script type="module">
import {
    OpenLcb, WebSocketTransport,
    TransportBusyError,
} from '../../src/index.js';
import { LocalStorageConfigMemory } from '../../src/storage/localstorage-config-memory.js';
import {
    NODE_ID,
    OpenLcbUserConfig_node_parameters,
} from './openlcb_user_config.js';

// Persist Configuration Memory across reloads.  Size derives from the node's
// declared 0xFD address space so the two stay in sync.
const cfgMem = new LocalStorageConfigMemory({
    size: OpenLcbUserConfig_node_parameters.addressSpaceConfigMemory.highestAddress + 1,
});

const $ = (id) => document.getElementById(id);

// Pre-fill the form's Node ID input from the config-file default.  The user
// can still override it before clicking Connect.
$('nodeId').value = NODE_ID.toString(16).padStart(12, '0');

// When this page is served by JMRI on a LAN host (e.g. http://layout.local:12080/),
// default the WebSocket URL to a same-origin path.  Skip localhost — there the
// page is typically served by a dev server on a different port than JMRI, so
// the static default (ws://localhost:12080/lcc/hub) is a better starting point.
if ((location.protocol === 'http:' || location.protocol === 'https:')
    && location.hostname !== 'localhost'
    && location.hostname !== '127.0.0.1') {
    const wsScheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
    $('url').value = `${wsScheme}//${location.host}/lcc/hub/`;
}
const log = (msg) => {
    const t = new Date().toISOString().slice(11, 23);
    const el = $('log');
    el.textContent += `[${t}] ${msg}\n`;
    el.scrollTop = el.scrollHeight;
};

let openlcb = null;
let node = null;

function setState(name) {
    const el = $('state');
    el.textContent = name;
    el.className = `status ${name}`;
    const locked = name === 'connected' || name === 'connecting';
    $('connect').disabled = locked;
    $('disconnect').disabled = name !== 'connected';
    $('sendPcer').disabled = name !== 'connected' || !node;
    $('url').disabled = locked;
    $('nodeId').disabled = locked;
    $('consumerCount').disabled = locked;
    $('producerCount').disabled = locked;
}

$('connect').addEventListener('click', async () => {
    const url = $('url').value.trim();
    const nodeIdHex = $('nodeId').value.trim();
    if (!url || !nodeIdHex) return;

    const nodeId = BigInt('0x' + nodeIdHex);
    const clamp = (v) => Math.max(0, Math.min(255, Number.isFinite(v) ? Math.floor(v) : 0));
    const consumerCount = clamp(parseInt($('consumerCount').value, 10));
    const producerCount = clamp(parseInt($('producerCount').value, 10));
    $('consumerCount').value = consumerCount;
    $('producerCount').value = producerCount;

    setState('connecting');
    try {
        openlcb = await OpenLcb.create({
            transport: new WebSocketTransport({ url }),
            callbacks: {
                onTransportConnect:    () => { log('transport connected'); },
                onTransportDisconnect: () => { setState('disconnected'); log('transport disconnected'); node = null; },
                onTransportError:      (err) => log(`transport error: ${err?.message ?? err}`),
            },
        });

        // Spread the openlcb_user_config.js parameters; let the form
        // override the consumer/producer auto-create counts.
        node = openlcb.createNode(nodeId, {
            ...OpenLcbUserConfig_node_parameters,
            consumerCountAutocreate: consumerCount,
            producerCountAutocreate: producerCount,
        }, {
            onLoginComplete: (n) => {
                log(`node ${n.id.toString(16)} login complete`);
                setState('connected'); // re-enable sendPcer
            },
            onConsumedEventIdentified: (n, idx, eventId, status) => {
                log(`consumed event: ${eventId.toString(16)} status=${status}`);
            },
            onPcEventReport: (n, eventId) => {
                log(`PCER received: ${eventId.toString(16)}`);
            },
            // Configuration Memory persists in localStorage, keyed by NodeID.
            // ACDI User name/description (offsets 0..126 of space 0xFD) and
            // every CDI-defined byte ride this same path.
            onConfigMemRead:  cfgMem.read.bind(cfgMem),
            onConfigMemWrite: cfgMem.write.bind(cfgMem),

            // Memory Configuration ops — fired by the WASM bridge after the
            // library has already sent the datagram-OK reply.  Per spec:
            //   §4.23 Update Complete (0xA8): notify only, reset optional
            //   §4.24 Reset/Reboot   (0xA9): SHALL reboot to power-on state
            //   §4.25 Factory Reset  (0xAA): restore config to defaults
            onUpdateComplete: (n) => log(`config update complete on ${n.id.toString(16)}`),
            onReboot:         (n) => { log(`reset/reboot received for ${n.id.toString(16)}`); softReboot(); },
            onFactoryReset:   (n) => {
                log(`factory reset received for ${n.id.toString(16)} — clearing storage`);
                cfgMem.clear(n.id);
            },
        });

        log(`node allocated: ${node.id.toString(16)}`);
        await openlcb.start();
    } catch (err) {
        log(`start failed: ${err?.message ?? err}`);
        setState('disconnected');
    }
});

$('disconnect').addEventListener('click', async () => {
    if (openlcb) {
        await openlcb.stop();
        log('stopped');
    }
});

// Soft reboot — discards the WASM module and re-instantiates a fresh stack,
// keeping the WebSocket open.  Triggered from the Reset/Reboot Memory Config
// op.  The node handle survives; its loginComplete promise is replaced.
async function softReboot() {
    if (!openlcb) return;
    try {
        await openlcb.reboot();
        // onLoginComplete fires for the fresh node on the existing transport.
    } catch (e) {
        log(`reboot failed: ${e?.message ?? e}`);
        setState('disconnected');
    }
}

$('sendPcer').addEventListener('click', () => {
    const eventHex = $('event').value.trim();
    if (!eventHex || !openlcb || !node) return;
    const eventId = BigInt('0x' + eventHex);
    try {
        node.sendPcer(eventId);
        log(`sendPcer(${eventId.toString(16)}) ok`);
    } catch (e) {
        if (e instanceof TransportBusyError) {
            log(`sendPcer busy, retry later`);
        } else {
            log(`sendPcer error: ${e?.message ?? e}`);
        }
    }
});
</script>
</body>
</html>
